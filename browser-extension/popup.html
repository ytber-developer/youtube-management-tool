<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facebook Reels Scraper</title>
  <style>
    body {
      width: 400px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      margin: 0;
    }
    
    h1 {
      font-size: 18px;
      margin: 0 0 15px 0;
      color: #1877f2;
    }
    
    .info {
      background: #e7f3ff;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 13px;
      color: #333;
    }
    
    .input-group {
      margin-bottom: 15px;
    }
    
    label {
      display: block;
      margin-bottom: 5px;
      font-size: 13px;
      font-weight: 600;
      color: #333;
    }
    
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      box-sizing: border-box;
    }
    
    input:focus {
      outline: none;
      border-color: #1877f2;
    }
    
    button {
      width: 100%;
      padding: 10px;
      background: #1877f2;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    button:hover {
      background: #166fe5;
    }
    
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    
    #status {
      margin-top: 15px;
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }
    
    #status.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    
    #status.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    
    #status.info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }
    
    .progress {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>📹 Facebook Reels Scraper</h1>
  
  <div class="info">
    <strong>📋 Hướng dẫn:</strong><br>
    1️⃣ Vào trang Reels của Facebook Page<br>
    2️⃣ VD: facebook.com/<strong>pagename/reels</strong><br>
    3️⃣ Nếu lỗi, hãy <strong>refresh trang</strong> (F5)<br>
    4️⃣ Click "Bắt đầu scrape" bên dưới
  </div>
  
  <div class="input-group">
    <label for="maxReels">Số lượng reels tối đa:</label>
    <input type="number" id="maxReels" value="50" min="1" max="500">
  </div>
  
  <button id="startBtn">🚀 Bắt đầu scrape</button>
  
  <div id="status"></div>
  
  <script src="popup.js"></script>
</body>
</html>
